<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Unfollow Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <img src="icons/icon48.png" alt="X Unfollow Pro" class="popup-logo">
      <div class="popup-title">
        <h1>X Unfollow Pro</h1>
        <span class="version">v1.0.0 – Free Edition</span>
      </div>
    </div>

    <div class="plan-badge" id="planBadge">
      <span class="plan-dot"></span>
      <span class="plan-text">All Features Unlocked</span>
    </div>

    <div class="stats-card">
      <div class="stat-row">
        <span class="stat-label">Total unfollows</span>
        <span class="stat-value" id="unfollowCount">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Status</span>
        <span class="stat-value" style="color: #4caf50;">Unlimited ✓</span>
      </div>
    </div>

    <div class="actions">
      <a href="https://x.com/following" target="_blank" class="btn btn-primary" id="openXBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Open X.com
      </a>
    </div>

    <div class="popup-footer">
      <a href="#" id="historyLink">View History</a>
      <span class="separator">•</span>
      <a href="https://github.com" target="_blank">GitHub</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
